<!DOCTYPE html>
<html>
<head>
<title>Hotel Gallery</title>
<link rel="stylesheet" href="style.css">

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f4f4;
text-align:center;
}

header{
background:#333;
color:white;
padding:20px;
}

nav{
background:#555;
padding:10px;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:yellow;
}

.gallery-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.gallery-container img{
width:100%;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
transition:0.3s;
}

.gallery-container img:hover{
transform:scale(1.05);
}

footer{
background:#333;
color:white;
padding:10px;
margin-top:20px;
}

</style>

</head>

<body>

<header>
<h1>City Hotel Gallery</h1>
<p>Explore Our Beautiful Hotel</p>
</header>

<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

</section>

</footer>

</html>
